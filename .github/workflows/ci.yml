name: CI

on:
  push:
    branches: [main, master, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quantumfield_test
          POSTGRES_USER: quantumfield
          POSTGRES_PASSWORD: quantumfield_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantumfield -d quantumfield_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://quantumfield:quantumfield_test@localhost:5432/quantumfield_test?sslmode=disable
      TEST_REDIS_ADDR: localhost:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache-dependency-path: backend/go.sum
      - run: go mod verify
      - run: test -z "$(gofmt -l ./cmd ./internal ./migrations)"
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go test -tags=integration ./internal/httpapi
      - run: go build ./cmd/...

  frontend:
    name: React frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
