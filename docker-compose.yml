name: quantumfield

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantumfield}
      POSTGRES_USER: ${POSTGRES_USER:-quantumfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantumfield_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantumfield} -d ${POSTGRES_DB:-quantumfield}"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: ./backend
      args:
        SERVICE: api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quantumfield}:${POSTGRES_PASSWORD:-quantumfield_dev}@postgres:5432/${POSTGRES_DB:-quantumfield}?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-me-please-32}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      API_PORT: "8080"
      GIN_MODE: ${GIN_MODE:-release}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SEED_DEMO: ${SEED_DEMO:-true}
      MAX_SCAN_RETRIES: ${MAX_SCAN_RETRIES:-3}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quantumfield}:${POSTGRES_PASSWORD:-quantumfield_dev}@postgres:5432/${POSTGRES_DB:-quantumfield}?sslmode=disable
      REDIS_ADDR: redis:6379
      SCAN_TIMEOUT_SECONDS: ${SCAN_TIMEOUT_SECONDS:-15}
      MAX_SCAN_RETRIES: ${MAX_SCAN_RETRIES:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    profiles: ["tools"]
    build:
      context: ./backend
      args:
        SERVICE: migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quantumfield}:${POSTGRES_PASSWORD:-quantumfield_dev}@postgres:5432/${POSTGRES_DB:-quantumfield}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    profiles: ["tools"]
    build:
      context: ./backend
      args:
        SERVICE: seed
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quantumfield}:${POSTGRES_PASSWORD:-quantumfield_dev}@postgres:5432/${POSTGRES_DB:-quantumfield}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
